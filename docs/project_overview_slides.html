<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Local Window Copilot · 项目介绍</title>
<style>
  :root{
    --bg:#0d1117;
    --bg2:#161b22;
    --panel:#1c2230;
    --line:#2a3142;
    --text:#e6edf3;
    --muted:#9aa7b8;
    --accent:#4dd0e1;
    --accent2:#7c9eff;
    --warn:#ffb86b;
    --good:#7ee787;
    --bad:#ff7b72;
    --code:#0e1116;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--text);
    font-family:"PingFang SC","Microsoft YaHei","Segoe UI",-apple-system,Roboto,sans-serif;
    overflow:hidden;-webkit-font-smoothing:antialiased}
  #deck{position:fixed;inset:0}
  .slide{position:absolute;inset:0;display:none;
    padding:54px 72px;flex-direction:column;
    animation:fade .35s ease}
  .slide.active{display:flex}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* Header */
  .top{display:flex;justify-content:space-between;align-items:center;
    color:var(--muted);font-size:13px;letter-spacing:.04em;margin-bottom:28px}
  .top .tag{color:var(--accent);font-weight:600}
  .top .pager{font-variant-numeric:tabular-nums}

  /* Titles */
  h1{font-size:46px;line-height:1.18;font-weight:700;letter-spacing:-.01em}
  h2{font-size:34px;font-weight:700;margin-bottom:6px;letter-spacing:-.005em}
  h3{font-size:20px;font-weight:600;color:var(--accent);margin-bottom:10px}
  .lead{font-size:18px;color:var(--muted);line-height:1.6;max-width:920px}
  .accent{color:var(--accent)}
  .accent2{color:var(--accent2)}
  .warn{color:var(--warn)}
  .good{color:var(--good)}
  .bad{color:var(--bad)}

  /* Cover */
  .cover{justify-content:center;align-items:flex-start;padding:0 80px}
  .cover .eyebrow{color:var(--accent);font-size:14px;letter-spacing:.3em;
    text-transform:uppercase;margin-bottom:18px;font-weight:600}
  .cover h1{font-size:64px;max-width:1000px;margin-bottom:18px}
  .cover .sub{font-size:22px;color:var(--text);max-width:880px;line-height:1.55;margin-bottom:30px}
  .cover .meta{display:flex;gap:28px;color:var(--muted);font-size:15px}
  .cover .meta b{color:var(--text);font-weight:600}
  .cover-grid{position:absolute;inset:0;pointer-events:none;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),
                     linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:60px 60px;opacity:.18;
    -webkit-mask-image:radial-gradient(ellipse at 70% 40%,#000 30%,transparent 75%);
            mask-image:radial-gradient(ellipse at 70% 40%,#000 30%,transparent 75%)}
  .mascot{position:absolute;right:80px;top:50%;transform:translateY(-50%);
    width:200px;height:200px;border-radius:50%;
    background:radial-gradient(circle at 50% 40%,#1b2330,#0d1117);
    box-shadow:0 0 60px rgba(77,208,225,.25),inset 0 0 30px rgba(77,208,225,.15);
    display:flex;align-items:center;justify-content:center;
    border:1px solid var(--line);overflow:hidden}
  .mascot img{width:80%;height:auto;filter:drop-shadow(0 6px 18px rgba(0,0,0,.5))}

  /* Content layout */
  .body{flex:1;display:flex;flex-direction:column;gap:22px;min-height:0}
  .row{display:flex;gap:22px}
  .col{flex:1;display:flex;flex-direction:column;gap:14px;min-width:0}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:22px 24px}
  .card h3{margin-bottom:10px}
  .card p{color:var(--muted);font-size:15px;line-height:1.65}
  .card .num{display:inline-flex;align-items:center;justify-content:center;
    width:30px;height:30px;border-radius:8px;background:rgba(77,208,225,.12);
    color:var(--accent);font-weight:700;font-size:14px;margin-bottom:14px}

  ul.clean{list-style:none;display:flex;flex-direction:column;gap:9px}
  ul.clean li{position:relative;padding-left:20px;color:var(--muted);font-size:15px;line-height:1.55}
  ul.clean li::before{content:"";position:absolute;left:2px;top:9px;width:6px;height:6px;
    border-radius:50%;background:var(--accent)}
  ul.clean li b{color:var(--text);font-weight:600}

  /* Tables */
  table{width:100%;border-collapse:collapse;font-size:14.5px}
  th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--line)}
  th{color:var(--accent);font-weight:600;font-size:13px;letter-spacing:.04em;text-transform:uppercase}
  td{color:var(--muted);line-height:1.5}
  td b{color:var(--text);font-weight:600}
  td:first-child{color:var(--text)}

  /* Code / diagram */
  pre{background:var(--code);border:1px solid var(--line);border-radius:12px;
    padding:18px 22px;overflow:auto;font-family:"JetBrains Mono","Consolas",monospace;
    font-size:13.5px;line-height:1.65;color:#c9d4e3}
  pre .k{color:var(--accent)}
  pre .s{color:var(--good)}
  pre .c{color:#5d6b7e;font-style:italic}
  pre .h{color:var(--warn)}

  /* Diagram */
  .diagram{background:var(--code);border:1px solid var(--line);border-radius:12px;
    padding:26px 28px;font-family:"JetBrains Mono","Consolas",monospace;font-size:14px;
    line-height:1.85;white-space:pre;color:#c9d4e3;overflow:auto}
  .diagram .accent{color:var(--accent)}
  .diagram .accent2{color:var(--accent2)}
  .diagram .warn{color:var(--warn)}
  .diagram .good{color:var(--good)}

  /* Pills */
  .pills{display:flex;flex-wrap:wrap;gap:8px}
  .pill{background:rgba(124,158,255,.08);border:1px solid rgba(124,158,255,.3);
    color:var(--accent2);padding:6px 14px;border-radius:999px;font-size:13px;font-weight:500}
  .pill.alt{background:rgba(77,208,225,.08);border-color:rgba(77,208,225,.3);color:var(--accent)}

  /* Two-line flow */
  .flow{display:flex;align-items:stretch;gap:0;margin-top:6px}
  .flow .step{flex:1;background:var(--panel);border:1px solid var(--line);
    padding:14px 16px;font-size:13.5px;line-height:1.5;color:var(--muted)}
  .flow .step b{display:block;color:var(--text);font-size:14.5px;margin-bottom:3px}
  .flow .step.head{background:rgba(77,208,225,.08);border-color:rgba(77,208,225,.35)}
  .flow .arrow{display:flex;align-items:center;justify-content:center;width:28px;
    color:var(--accent);font-size:18px}

  /* contrast box */
  .contrast{display:flex;gap:16px}
  .contrast .box{flex:1;border-radius:12px;padding:16px 18px;font-size:14px;line-height:1.6}
  .contrast .yes{background:rgba(126,231,135,.06);border:1px solid rgba(126,231,135,.3)}
  .contrast .no{background:rgba(255,123,114,.06);border:1px solid rgba(255,123,114,.3)}
  .contrast .box .h{font-weight:700;margin-bottom:6px;font-size:13px;letter-spacing:.05em;text-transform:uppercase}
  .contrast .yes .h{color:var(--good)}
  .contrast .no .h{color:var(--bad)}
  .contrast .box ul{list-style:none}
  .contrast .box li{padding-left:18px;position:relative;margin-bottom:5px;color:var(--muted)}
  .contrast .yes li::before{content:"✓";position:absolute;left:0;color:var(--good);font-weight:700}
  .contrast .no li::before{content:"✕";position:absolute;left:0;color:var(--bad);font-weight:700}

  /* Roadmap */
  .roadmap{display:flex;flex-direction:column;gap:10px}
  .rm{display:flex;align-items:center;gap:16px;padding:11px 16px;border-radius:10px;
    background:var(--panel);border:1px solid var(--line)}
  .rm .dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
  .rm.done .dot{background:var(--good);box-shadow:0 0 0 4px rgba(126,231,135,.15)}
  .rm.next .dot{background:var(--warn);box-shadow:0 0 0 4px rgba(255,184,107,.15)}
  .rm .t{flex:1;font-size:15px;color:var(--text)}
  .rm.done .t{color:var(--muted)}
  .rm .st{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
  .rm.done .st{color:var(--good)}
  .rm.next .st{color:var(--warn)}

  /* End */
  .end{justify-content:center;align-items:center;text-align:center}
  .end h1{font-size:54px;margin-bottom:14px}
  .end .lead{max-width:680px;margin:0 auto}
  .end .meta{margin-top:34px;color:var(--muted);font-size:14px}

  /* Nav */
  #nav{position:fixed;bottom:18px;right:24px;display:flex;gap:8px;align-items:center;
    z-index:50}
  #nav button{background:var(--panel);border:1px solid var(--line);color:var(--text);
    width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:14px;
    transition:all .15s;display:flex;align-items:center;justify-content:center}
  #nav button:hover{border-color:var(--accent);color:var(--accent)}
  #nav .count{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;
    min-width:60px;text-align:center}
  #progress{position:fixed;left:0;bottom:0;height:3px;background:var(--accent);
    transition:width .3s;z-index:50}
  .hint{position:fixed;bottom:18px;left:24px;color:var(--muted);font-size:12px;z-index:50;
    opacity:.7}
</style>
</head>
<body>
<div id="deck"></div>
<div id="nav">
  <button onclick="go(-1)">‹</button>
  <span class="count" id="counter">1 / 1</span>
  <button onclick="go(1)">›</button>
</div>
<div id="progress"></div>
<div class="hint">← → 翻页 · F 全屏</div>

<script>
const slides = [
// 1 封面
`<section class="slide cover active">
  <div class="cover-grid"></div>
  <div class="mascot"><img src="../assets/mascot/composed/mascot_idle.png" alt="mascot"></div>
  <div class="eyebrow">Local · Windows · Privacy-first</div>
  <h1>Local Window<br><span class="accent">Copilot</span></h1>
  <div class="sub">运行在 Windows 本地桌面的 AI 伙伴：观察前台窗口、按需检索上下文、用可追溯证据回答。</div>
  <div class="meta">
    <span><b>汇报人</b>　宋林蔚</span>
    <span><b>组会</b>　2026-07-07</span>
    <span><b>仓库</b>　github.com/fjnuslw</span>
  </div>
</section>`,

// 2 项目定位
`<section class="slide">
  <div class="top"><span class="tag">01 · 项目定位</span><span class="pager">02</span></div>
  <h2>这是什么？不是什么？</h2>
  <p class="lead">一句话定位：一个运行在本地 Windows 桌面的 AI 伙伴，后台把目标窗口截图转成结构化观察，前台在用户提问时按需取证、用证据回答。</p>
  <div class="body">
    <div class="contrast">
      <div class="box yes">
        <div class="h">项目要做</div>
        <ul>
          <li>快速观察当前前台窗口</li>
          <li>用本地 VLM 生成结构化观察与关键点</li>
          <li>用户追问时结合观察与短期记忆回答</li>
          <li>本地 RuntimeStore 保存状态与短期记忆</li>
          <li>低打扰、可观测、可复盘、可清空</li>
        </ul>
      </div>
      <div class="box no">
        <div class="h">明确不做</div>
        <ul>
          <li>不自动点击、输入、提交、操作电脑</li>
          <li>不做复杂规划型自主 Agent</li>
          <li>不做 OCR / UI Automation 主链路</li>
          <li>不做长期人格记忆</li>
          <li>不堆叠 fallback 掩盖主链路问题</li>
        </ul>
      </div>
    </div>
    <div class="card">
      <h3>产品中心</h3>
      <p>陪伴式桌面伙伴；截图 + VLM 是<b style="color:var(--text)">后台感知能力</b>，不是前台产品本体。默认不汇报屏幕，默认陪伴；只有用户邀请时才进入分析。</p>
    </div>
  </div>
</section>`,

// 3 三条主线
`<section class="slide">
  <div class="top"><span class="tag">02 · 核心思想</span><span class="pager">03</span></div>
  <h2>三条主线，职责分离</h2>
  <p class="lead">整个项目就是三条互不污染的链路：观察线只产生证据，对话线只承接用户问题，调试线只让一切可审计。</p>
  <div class="body">
    <div class="row">
      <div class="col">
        <div class="card">
          <span class="num">1</span>
          <h3>观察线 · 产生证据</h3>
          <p>目标窗口截图 → MiniCPM-V 结构化观察 → SQLite 记录 + 截图文件。只写证据，不负责对话、不主动建议、不污染长期记忆。</p>
        </div>
      </div>
      <div class="col">
        <div class="card">
          <span class="num">2</span>
          <h3>对话线 · 按需取证</h3>
          <p>用户问题 + profile + 会话历史 → 模型自己决定是否调 <code>memory.search(query)</code> → 拿到证据后基于证据回答。</p>
        </div>
      </div>
      <div class="col">
        <div class="card">
          <span class="num">3</span>
          <h3>调试线 · 全程可审计</h3>
          <p>WebUI 展示 latest / history / 原始 JSON / 截图缩略图 / 工具 trace / runtime logs，回答"模型查了什么、拿到哪条记录、为什么这样回答"。</p>
        </div>
      </div>
    </div>
    <div class="card" style="background:rgba(77,208,225,.05);border-color:rgba(77,208,225,.3)">
      <h3 style="margin-bottom:6px">设计哲学</h3>
      <p>主链路不行就<span class="warn">明确失败、暂停或提示用户</span>，不引入掩盖问题的替代链。缺截图、缺观察、工具失败都要<b style="color:var(--text)">明确暴露</b>，而不是用泛泛文本兜底。</p>
    </div>
  </div>
</section>`,

// 4 系统架构
`<section class="slide">
  <div class="top"><span class="tag">03 · 系统架构</span><span class="pager">04</span></div>
  <h2>三层架构：桌面 → 后端 → 本地模型</h2>
  <div class="body">
    <div class="diagram"><span class="c">┌──────────────────────────────────────────────────────────────────┐</span>
<span class="c">│</span>  <span class="accent2">Desktop Floating Window</span>                                          <span class="c">│</span>
<span class="c">│</span>  Idle / Observing / Analyzing / Privacy / Error  ·  5 种状态     <span class="c">│</span>
<span class="c">└──────────────────────────────────────────────────────────────────┘</span>
                               <span class="accent">│</span>  FastAPI (127.0.0.1:18081)
                               <span class="accent">▼</span>
<span class="c">┌──────────────────────────────────────────────────────────────────┐</span>
<span class="c">│</span>  <span class="accent2">Backend</span>   assistant.py  ·  window.py  ·  webui.py             <span class="c">│</span>
<span class="c">│</span>                                                                  <span class="c">│</span>
<span class="c">│</span>  <span class="accent">ChatAgent</span>      profile 冻结 → probe → stream(+tools)         <span class="c">│</span>
<span class="c">│</span>                 └─ memory.search(query)  ·  runtime trace        <span class="c">│</span>
<span class="c">│</span>                                                                  <span class="c">│</span>
<span class="c">│</span>  <span class="accent">Observation pipeline</span>                                            <span class="c">│</span>
<span class="c">│</span>                 ├─ window capture                                <span class="c">│</span>
<span class="c">│</span>                 ├─ MiniCPM-V structured observation              <span class="c">│</span>
<span class="c">│</span>                 └─ window summary store                          <span class="c">│</span>
<span class="c">│</span>                                                                  <span class="c">│</span>
<span class="c">│</span>  <span class="accent">RuntimeStore</span>   runtime_json · runtime_events · chat_history_fts <span class="c">│</span>
<span class="c">└──────────────────────────────────────────────────────────────────┘</span>
                               <span class="accent">│</span>  OpenAI-compatible API
                               <span class="accent">▼</span>
<span class="c">┌──────────────────────────────────────────────────────────────────┐</span>
<span class="c">│</span>  <span class="warn">llama.cpp server</span>  +  <span class="warn">MiniCPM-V 4.6</span>  (256K context)         <span class="c">│</span>
<span class="c">└──────────────────────────────────────────────────────────────────┘</span></div>
    <div class="row">
      <div class="card" style="flex:1.2">
        <h3>关键设计</h3>
        <p>所有运行时 JSON 状态走 SQLite RuntimeStore；截图存文件系统，SQLite 只存路径/hash/元数据。零外部数据库依赖，纯本地。</p>
      </div>
      <div class="card" style="flex:1">
        <h3>进程边界</h3>
        <p>桌面浮窗 ←FastAPI→ Python 后端 ←OpenAI API→ llama.cpp。三层都可独立重启，互不耦合。</p>
      </div>
    </div>
  </div>
</section>`,

// 5 观察线详解
`<section class="slide">
  <div class="top"><span class="tag">04 · 观察线</span><span class="pager">05</span></div>
  <h2>观察线：从截图到结构化证据</h2>
  <p class="lead">观察线只产生证据，不做对话。输入是窗口截图 + metadata，输出是写入 SQLite 的完整结构化字段 + 截图 PNG。</p>
  <div class="body">
    <div class="flow">
      <div class="step head"><b>目标窗口选择</b>排除 Copilot 自身窗 / 优先前台 / 兜底枚举</div>
      <div class="arrow">→</div>
      <div class="step"><b>截图捕获</b>Win32 + 标题/进程/bounds/hash/捕获时间</div>
      <div class="arrow">→</div>
      <div class="step"><b>VLM 分析</b>MiniCPM-V 按 prompt 契约输出结构化 JSON</div>
      <div class="arrow">→</div>
      <div class="step"><b>SQLite 落盘</b>latest_analysis + summaries 滚动历史</div>
      <div class="arrow">→</div>
      <div class="step"><b>截图文件</b>backend/data/captures/*.png</div>
    </div>
    <div class="row">
      <div class="col">
        <div class="card">
          <h3>结构化字段（每条记录必含）</h3>
          <ul class="clean">
            <li><b>summary / key_points</b>　索引与检索 rank_text</li>
            <li><b>regions / visible_text / ui_elements</b>　区域级证据</li>
            <li><b>entities / uncertain_areas</b>　实体 + 诚实标注不确定</li>
            <li><b>screenshot_path / hash / bounds</b>　可追溯</li>
            <li><b>vision_input</b>　模型输入参数</li>
          </ul>
        </div>
      </div>
      <div class="col">
        <div class="card">
          <h3>失败分型（不掩盖问题）</h3>
          <ul class="clean">
            <li><b>capture_failed</b>　没拿到可捕获窗口</li>
            <li><b>vision_failed</b>　VLM 请求失败</li>
            <li><b>vision_length</b>　命中输出上限且无法解析</li>
            <li><b>vision_parse_failed</b>　响应非结构化 JSON</li>
            <li><b>store_failed</b>　SQLite 写入失败</li>
          </ul>
          <p style="margin-top:10px;font-size:14px">UI 与日志必须显示真实失败点，<span class="bad">不允许</span>用"当前窗口可能是…"泛化回答遮盖。</p>
        </div>
      </div>
    </div>
  </div>
</section>`,

// 6 对话线 probe->stream
`<section class="slide">
  <div class="top"><span class="tag">05 · 对话线</span><span class="pager">06</span></div>
  <h2>对话线：probe → stream 两段式</h2>
  <p class="lead">小 VLM 的 function calling 不稳定——有时会把"调用 memory.search"写成自然语言而非结构化 <code>tool_calls</code>。两段式把这个不稳定性限制在工具决策层，最终回答始终由 stream 产出。</p>
  <div class="body">
    <div class="diagram"><span class="c">1.</span> <span class="k">probe 阶段</span>  (complete_chat_response + tools)
   模型决定是否调 <span class="s">memory.search(query)</span>
   <span class="h">→ 只读取结构化 tool_calls，content 一律丢弃</span>

<span class="c">2.</span> <span class="k">工具执行</span>    后端执行检索，生成带 record_id/source 的结果，追加到 messages

<span class="c">3.</span> <span class="k">stream 阶段</span> (stream_chat + tools)
   流式生成最终答案；<span class="good">tools 始终可用</span>，模型仍可在流中发起 tool_calls

let idx = 0;
const deck = document.getElementById('deck');
function render(){
  deck.innerHTML = slides[idx];
  const s = deck.querySelector('.slide');
  if(s) s.classList.add('active');
  document.getElementById('counter').textContent = (idx+1) + ' / ' + slides.length;
  document.getElementById('progress').style.width = ((idx+1)/slides.length*100) + '%';
}
function go(d){
  idx = Math.max(0, Math.min(slides.length-1, idx+d));
  render();
}
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){go(1);e.preventDefault()}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){go(-1);e.preventDefault()}
  else if(e.key==='Home'){idx=0;render()}
  else if(e.key==='End'){idx=slides.length-1;render()}
  else if(e.key==='f'||e.key==='F'){
    if(!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});
render();
</script>
</body>
</html>
