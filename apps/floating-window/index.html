<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floating Assistant</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="desktop-stage" aria-label="Floating assistant prototype">
      <section class="floating-agent" id="floatingAgent" data-state="idle">
        <div class="agent-drag-surface" id="dragSurface" aria-label="拖动悬浮助手">
          <div class="agent-aura" aria-hidden="true"></div>
          <button class="mascot-button" id="mascotButton" aria-label="切换状态">
            <span class="mascot-rig" aria-hidden="true">
              <img
                class="mascot-layer mascot-base"
                src="../../assets/mascot/rive_import/mascot_base_idle.png"
                alt=""
                draggable="false"
              />
              <img
                class="mascot-layer face-layer face-observing"
                src="../../assets/mascot/rive_import/face_observing_overlay.png"
                alt=""
                draggable="false"
              />
              <img
                class="mascot-layer face-layer face-analyzing"
                src="../../assets/mascot/rive_import/face_analyzing_overlay.png"
                alt=""
                draggable="false"
              />
              <img
                class="mascot-layer face-layer face-privacy"
                src="../../assets/mascot/rive_import/face_privacy_overlay.png"
                alt=""
                draggable="false"
              />
              <img
                class="mascot-layer face-layer face-error"
                src="../../assets/mascot/rive_import/face_error_overlay.png"
                alt=""
                draggable="false"
              />
              <span class="scan-brackets"></span>
              <span class="status-sparks"></span>
            </span>
          </button>
          <div class="state-chip" id="stateChip" aria-live="polite">待命</div>
        </div>

        <nav class="agent-toolbar" aria-label="状态控制">
          <button class="tool-button is-active" data-state-button="idle" aria-label="待命" title="待命">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 4.75a7.25 7.25 0 1 0 0 14.5 7.25 7.25 0 0 0 0-14.5Z" />
              <path d="M9 10.6h.01M15 10.6h.01M9.7 14.1c1.35 1.1 3.25 1.1 4.6 0" />
            </svg>
          </button>
          <button class="tool-button" data-state-button="observing" aria-label="观察" title="观察">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2.75 12s3.25-5.25 9.25-5.25S21.25 12 21.25 12 18 17.25 12 17.25 2.75 12 2.75 12Z" />
              <path d="M12 9.25a2.75 2.75 0 1 0 0 5.5 2.75 2.75 0 0 0 0-5.5Z" />
            </svg>
          </button>
          <button class="tool-button" data-state-button="analyzing" aria-label="分析" title="分析">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3.75v3M12 17.25v3M20.25 12h-3M6.75 12h-3M17.8 6.2l-2.1 2.1M8.3 15.7l-2.1 2.1M17.8 17.8l-2.1-2.1M8.3 8.3 6.2 6.2" />
              <path d="M12 8.25a3.75 3.75 0 1 0 0 7.5 3.75 3.75 0 0 0 0-7.5Z" />
            </svg>
          </button>
          <button class="tool-button" data-state-button="privacy" aria-label="隐私" title="隐私">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3.75 5.75 6.2v5.15c0 4.05 2.45 7.7 6.25 8.9 3.8-1.2 6.25-4.85 6.25-8.9V6.2L12 3.75Z" />
              <path d="M9.5 12.1 11.25 14 15 9.9" />
            </svg>
          </button>
          <button class="tool-button" data-state-button="error" aria-label="异常" title="异常">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3.75a8.25 8.25 0 1 0 0 16.5 8.25 8.25 0 0 0 0-16.5Z" />
              <path d="M12 7.5v5.3M12 16.35h.01" />
            </svg>
          </button>
        </nav>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
